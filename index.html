<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">

    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <meta property="og:title" content="Hurricane 2026 Packliste">
    <meta property="og:description" content="Pack-Manager für das Hurricane Festival 2026. Offline-fähig, mobil und am Desktop nutzbar.">
    <meta property="og:image" content="https://hurricane2026.netlify.app/icon-512.png">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Hurricane 2026 Packliste">
    <meta name="twitter:description" content="Pack-Manager für das Hurricane Festival 2026.">

        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.25s ease-out; }
        /* iOS autofocus zoom prevention: inputs must be >=16px */
        input, textarea { font-size: 16px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                tent: <path d="M3.5 21 12 3l8.5 18M9 21l3-6 3 6M2 21h20" />,
                shirt: <path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.62 1.96V10a2 2 0 0 0 2 2h2V22a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V12h2a2 2 0 0 0 2-2V5.42a2 2 0 0 0-1.62-1.96Z" />,
                utensils: <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />,
                wrench: <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z" />,
                ticket: <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v2Z" />,
                check: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3" />,
                checkCircle: <><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></>,
                circle: <circle cx="12" cy="12" r="10" />,
                plus: <path d="M12 5v14M5 12h14" />,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />,
                pencil: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3Z" />,
                share: <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" />,
                refresh: <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5" />,
                undo: <path d="M3 7v6h6M3 13a9 9 0 1 0 3-7.7L3 8" />,
                cloud: <path d="M17.5 19H9a5 5 0 0 1-.58-9.967A7 7 0 1 1 19 13.9a4.5 4.5 0 0 1-1.5 5.1Z" />,
                cloudOff: <path d="M17.5 19H9a5 5 0 0 1-.58-9.967 7 7 0 0 1 1.57-3.083M10.49 4.49A7 7 0 0 1 19 13.9M2 2l20 20" />,
                copy: <><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></>,
                x: <path d="M18 6 6 18M6 6l12 12" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const INITIAL_DATA = [
            { id: 'camping', title: 'Camping', icon: 'tent', items: [
                { id: 'c1', text: 'Zelt (inkl. Gestänge)', completed: false },
                { id: 'c2', text: 'Heringe & Gummihammer', completed: false },
                { id: 'c3', text: 'Pavillon', completed: false },
                { id: 'c4', text: 'Luftmatratze & Pumpe', completed: false },
                { id: 'c5', text: 'Schlafsack & Kissen', completed: false },
                { id: 'c6', text: 'Campingstühle & Tisch', completed: false },
                { id: 'c7', text: 'Beleuchtung (Stirnlampe)', completed: false }
            ]},
            { id: 'clothing', title: 'Kleidung', icon: 'shirt', items: [
                { id: 'cl1', text: 'Gummistiefel', completed: false },
                { id: 'cl2', text: 'Sneaker', completed: false },
                { id: 'cl3', text: 'Regenjacke/Poncho', completed: false },
                { id: 'cl4', text: 'Warmer Hoodie für nachts', completed: false },
                { id: 'cl5', text: 'Socken & Unterwäsche', completed: false },
                { id: 'cl6', text: 'Cap & Sonnenbrille', completed: false }
            ]},
            { id: 'food', title: 'Essen', icon: 'utensils', items: [
                { id: 'f1', text: 'Kühlbox', completed: false },
                { id: 'f2', text: 'Gaskocher & Kartuschen', completed: false },
                { id: 'f3', text: 'Camping-Geschirr', completed: false },
                { id: 'f4', text: 'Wasserkanister', completed: false },
                { id: 'f5', text: 'Dosenravioli & Brot', completed: false },
                { id: 'f6', text: 'Getränke (Dosen/Plastik)', completed: false }
            ]},
            { id: 'hygiene', title: 'Hygiene', icon: 'sparkles', items: [
                { id: 'h1', text: 'Toilettenpapier', completed: false },
                { id: 'h2', text: 'Feuchttücher', completed: false },
                { id: 'h3', text: 'Sonnencreme', completed: false },
                { id: 'h4', text: 'Zahnbürste & Zahnpasta', completed: false },
                { id: 'h5', text: 'Duschgel', completed: false },
                { id: 'h6', text: 'Pflaster & Ibuprofen', completed: false },
                { id: 'h7', text: 'Ohrstöpsel', completed: false }
            ]},
            { id: 'tools', title: 'Gadgets', icon: 'wrench', items: [
                { id: 't1', text: 'Panzertape', completed: false },
                { id: 't2', text: 'Kabelbinder', completed: false },
                { id: 't3', text: 'Powerbank & Ladekabel', completed: false },
                { id: 't4', text: 'Bollerwagen', completed: false },
                { id: 't5', text: 'Müllsäcke', completed: false }
            ]},
            { id: 'docs', title: 'Tickets', icon: 'ticket', items: [
                { id: 'd1', text: 'Festival-Ticket', completed: false },
                { id: 'd2', text: 'Parkticket', completed: false },
                { id: 'd3', text: 'Ausweis & Karte', completed: false }
            ]}
        ];

        const sortForDisplay = (items) => [...items].sort((a, b) => Number(a.completed) - Number(b.completed));

        const SYNC_ALPHABET = 'abcdefghjkmnpqrstuvwxyz23456789';
        const genSyncCode = () => {
            const buf = new Uint32Array(10);
            crypto.getRandomValues(buf);
            let s = '';
            for (const n of buf) s += SYNC_ALPHABET[n % SYNC_ALPHABET.length];
            return s;
        };
        const isValidSyncCode = (c) => /^[a-z0-9-]{6,40}$/.test(c);
        const fmtRelative = (ts) => {
            if (!ts) return '';
            const diff = Math.max(0, Date.now() - ts);
            if (diff < 5000) return 'gerade eben';
            if (diff < 60_000) return `vor ${Math.floor(diff/1000)} s`;
            if (diff < 3_600_000) return `vor ${Math.floor(diff/60_000)} min`;
            return `vor ${Math.floor(diff/3_600_000)} h`;
        };

        function SyncModal({ syncId, syncStatus, lastSyncedAt, onConnect, onDisconnect, onClose, onPullNow }) {
            const [codeInput, setCodeInput] = useState('');
            const [err, setErr] = useState('');
            const [copied, setCopied] = useState(false);
            const [tick, setTick] = useState(0);

            useEffect(() => {
                const t = setInterval(() => setTick(x => x + 1), 5000);
                return () => clearInterval(t);
            }, []);

            const doGenerate = () => {
                onConnect(genSyncCode());
            };
            const doLink = () => {
                const c = codeInput.trim().toLowerCase();
                if (!isValidSyncCode(c)) {
                    setErr('Code braucht 6–40 Zeichen (Buchstaben/Zahlen).');
                    return;
                }
                setErr('');
                onConnect(c);
            };
            const doCopy = async () => {
                try {
                    await navigator.clipboard.writeText(syncId);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 1500);
                } catch {}
            };

            return (
                <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4" onClick={onClose}>
                    <div className="bg-white w-full max-w-sm rounded-[40px] p-8 animate-slide-up" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-xl font-extrabold">Geräte-Sync</h3>
                            <button onClick={onClose} aria-label="Schließen" className="p-1 text-slate-400 hover:text-slate-700"><Icon name="x" className="w-5 h-5"/></button>
                        </div>

                        {!syncId ? (
                            <>
                                <p className="text-sm text-slate-500 mb-5">
                                    Verbinde Handy &amp; Rechner über einen Sync-Code. Beide Geräte sehen die selbe Liste, Änderungen synchronisieren sich automatisch.
                                </p>
                                <button onClick={doGenerate}
                                    className="w-full py-4 bg-blue-600 text-white rounded-2xl font-extrabold shadow-lg shadow-blue-100 active:scale-95 transition-transform mb-3">
                                    Neuen Sync-Code erstellen
                                </button>
                                <div className="flex items-center gap-3 my-5">
                                    <div className="flex-1 h-px bg-slate-100"></div>
                                    <span className="text-xs text-slate-400 font-bold uppercase tracking-wider">oder</span>
                                    <div className="flex-1 h-px bg-slate-100"></div>
                                </div>
                                <label className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-2 block">Code vom anderen Gerät eingeben</label>
                                <div className="flex gap-2">
                                    <input autoFocus value={codeInput} onChange={e => setCodeInput(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && doLink()}
                                        autoComplete="off" autoCapitalize="off" spellCheck={false}
                                        placeholder="z.B. k7m3p9qrxn" className="flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 font-mono" />
                                    <button onClick={doLink} className="bg-slate-900 text-white px-5 rounded-2xl font-bold active:scale-90 transition-transform">Verbinden</button>
                                </div>
                                {err && <p className="text-xs text-red-500 mt-2">{err}</p>}
                            </>
                        ) : (
                            <>
                                <p className="text-sm text-slate-500 mb-4">Dein Sync-Code — auf jedem anderen Gerät eingeben, um dieselbe Liste zu sehen:</p>
                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 mb-3 flex items-center justify-between gap-3">
                                    <code className="font-mono text-lg font-bold tracking-wider text-slate-800 break-all">{syncId}</code>
                                    <button onClick={doCopy} aria-label="Code kopieren" className="shrink-0 p-2 text-slate-500 hover:text-slate-900 active:scale-90 transition-all">
                                        <Icon name="copy" className="w-5 h-5"/>
                                    </button>
                                </div>
                                {copied && <p className="text-xs text-green-600 font-bold text-center -mt-1 mb-2">Kopiert!</p>}
                                <div className="flex items-center gap-2 text-xs mb-5">
                                    <span className={`w-2 h-2 rounded-full ${
                                        syncStatus === 'syncing' ? 'bg-blue-500 animate-pulse'
                                            : syncStatus === 'error' ? 'bg-red-500'
                                            : syncStatus === 'synced' ? 'bg-green-500'
                                            : 'bg-slate-300'
                                    }`}></span>
                                    <span className="text-slate-500">
                                        {syncStatus === 'syncing' ? 'Synchronisiere…'
                                            : syncStatus === 'error' ? 'Fehler — offline?'
                                            : syncStatus === 'synced' ? (lastSyncedAt ? `Synchron, ${fmtRelative(lastSyncedAt)}` : 'Synchron')
                                            : 'Bereit'}
                                    </span>
                                </div>
                                <button onClick={onPullNow} className="w-full py-3 bg-slate-50 text-slate-700 rounded-2xl font-bold mb-2 active:scale-95 transition-transform">Jetzt abrufen</button>
                                <button onClick={() => { if (confirm('Gerät trennen? Lokale Daten bleiben erhalten, werden aber nicht mehr synchronisiert.')) { onDisconnect(); onClose(); } }}
                                    className="w-full py-3 text-red-500 font-bold">Dieses Gerät trennen</button>
                            </>
                        )}
                        <p className="text-[11px] text-slate-400 mt-4 leading-relaxed">
                            Hinweis: Wer den Code kennt, kann die Liste lesen &amp; ändern. Teile ihn nur mit Personen, denen du vertraust.
                        </p>
                    </div>
                </div>
            );
        }

        function App() {
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('hurricane_2026_list');
                return saved ? JSON.parse(saved) : INITIAL_DATA;
            });
            const [activeCat, setActiveCat] = useState(() => {
                const saved = localStorage.getItem('hurricane_2026_active');
                const initial = JSON.parse(localStorage.getItem('hurricane_2026_list') || 'null') || INITIAL_DATA;
                return saved && initial.some(c => c.id === saved) ? saved : initial[0]?.id;
            });
            const [newItem, setNewItem] = useState('');
            const [showCatModal, setShowCatModal] = useState(false);
            const [showResetModal, setShowResetModal] = useState(false);
            const [showSyncModal, setShowSyncModal] = useState(false);
            const [newCatTitle, setNewCatTitle] = useState('');
            const [editing, setEditing] = useState(null); // {catId, itemId}
            const [editText, setEditText] = useState('');
            const [undoState, setUndoState] = useState(null); // {catId, item, index, key}

            // sync state
            const [syncId, setSyncId] = useState(() => localStorage.getItem('hurricane_2026_sync_id') || '');
            const [updatedAt, setUpdatedAt] = useState(() => parseInt(localStorage.getItem('hurricane_2026_updated') || '0'));
            const [syncStatus, setSyncStatus] = useState('idle'); // idle|syncing|synced|error
            const [lastSyncedAt, setLastSyncedAt] = useState(0);
            const skipTimestamp = useRef(false);
            const skipNextPush = useRef(false);
            const didMount = useRef(false);

            useEffect(() => {
                localStorage.setItem('hurricane_2026_list', JSON.stringify(categories));
                if (skipTimestamp.current) {
                    skipTimestamp.current = false;
                } else if (didMount.current) {
                    const now = Date.now();
                    setUpdatedAt(now);
                    localStorage.setItem('hurricane_2026_updated', String(now));
                } else {
                    didMount.current = true;
                }
            }, [categories]);

            useEffect(() => {
                if (activeCat) localStorage.setItem('hurricane_2026_active', activeCat);
            }, [activeCat]);

            useEffect(() => {
                if (!undoState) return;
                const t = setTimeout(() => setUndoState(null), 5000);
                return () => clearTimeout(t);
            }, [undoState?.key]);

            // --- Sync logic ---
            const pushRemote = async (nextUpdatedAt = updatedAt, cats = categories) => {
                if (!syncId) return { ok: false };
                setSyncStatus('syncing');
                try {
                    const res = await fetch(`/api/sync?id=${encodeURIComponent(syncId)}`, {
                        method: 'PUT',
                        headers: { 'content-type': 'application/json' },
                        body: JSON.stringify({ categories: cats, updatedAt: nextUpdatedAt, version: 1 })
                    });
                    if (!res.ok) throw new Error('http ' + res.status);
                    setSyncStatus('synced');
                    setLastSyncedAt(Date.now());
                    return { ok: true };
                } catch (e) {
                    setSyncStatus('error');
                    return { ok: false, error: e };
                }
            };

            const pullRemote = async () => {
                if (!syncId) return { ok: false };
                setSyncStatus('syncing');
                try {
                    const res = await fetch(`/api/sync?id=${encodeURIComponent(syncId)}`);
                    if (!res.ok) throw new Error('http ' + res.status);
                    const remote = await res.json();
                    if (remote && typeof remote.updatedAt === 'number' && remote.updatedAt > updatedAt) {
                        skipTimestamp.current = true;
                        skipNextPush.current = true;
                        setCategories(remote.categories);
                        setUpdatedAt(remote.updatedAt);
                        localStorage.setItem('hurricane_2026_updated', String(remote.updatedAt));
                    } else if (!remote && updatedAt > 0) {
                        await pushRemote(updatedAt, categories);
                    }
                    setSyncStatus('synced');
                    setLastSyncedAt(Date.now());
                    return { ok: true, remote };
                } catch (e) {
                    setSyncStatus('error');
                    return { ok: false, error: e };
                }
            };

            // On syncId change: pull
            useEffect(() => {
                if (!syncId) { setSyncStatus('idle'); return; }
                pullRemote();
            }, [syncId]);

            // On updatedAt change: debounced push
            useEffect(() => {
                if (!syncId || !updatedAt) return;
                if (skipNextPush.current) { skipNextPush.current = false; return; }
                const t = setTimeout(() => pushRemote(updatedAt, categories), 800);
                return () => clearTimeout(t);
            }, [updatedAt, syncId]);

            // On window focus: pull (catch changes from other device)
            useEffect(() => {
                if (!syncId) return;
                const onFocus = () => pullRemote();
                window.addEventListener('focus', onFocus);
                return () => window.removeEventListener('focus', onFocus);
            }, [syncId]);

            const connectSync = (code) => {
                const c = code.trim().toLowerCase();
                if (!isValidSyncCode(c)) return false;
                localStorage.setItem('hurricane_2026_sync_id', c);
                setSyncId(c);
                return true;
            };
            const disconnectSync = () => {
                localStorage.removeItem('hurricane_2026_sync_id');
                setSyncId('');
                setSyncStatus('idle');
            };

            const stats = useMemo(() => {
                let t = 0, c = 0;
                categories.forEach(cat => cat.items.forEach(i => { t++; if(i.completed) c++; }));
                return { total: t, done: c, p: t === 0 ? 0 : Math.round((c/t)*100) };
            }, [categories]);

            const toggle = (catId, itemId) => {
                setCategories(prev => prev.map(cat => cat.id === catId ? {
                    ...cat, items: cat.items.map(i => i.id === itemId ? {...i, completed: !i.completed} : i)
                } : cat));
            };

            const add = () => {
                if(!newItem.trim()) return;
                setCategories(prev => prev.map(cat => cat.id === activeCat ? {
                    ...cat, items: [...cat.items, { id: Date.now().toString(), text: newItem.trim(), completed: false }]
                } : cat));
                setNewItem('');
            };

            const del = (catId, itemId) => {
                let removed = null, removedIndex = -1;
                setCategories(prev => prev.map(cat => {
                    if (cat.id !== catId) return cat;
                    removedIndex = cat.items.findIndex(i => i.id === itemId);
                    removed = cat.items[removedIndex];
                    return { ...cat, items: cat.items.filter(i => i.id !== itemId) };
                }));
                if (removed) setUndoState({ catId, item: removed, index: removedIndex, key: Date.now() });
            };

            const undoDelete = () => {
                if (!undoState) return;
                const { catId, item, index } = undoState;
                setCategories(prev => prev.map(cat => cat.id === catId ? {
                    ...cat,
                    items: [...cat.items.slice(0, index), item, ...cat.items.slice(index)]
                } : cat));
                setUndoState(null);
            };

            const delCat = (catId) => {
                if (!confirm('Kategorie komplett löschen?')) return;
                setCategories(prev => {
                    const next = prev.filter(c => c.id !== catId);
                    if (activeCat === catId && next.length) setActiveCat(next[0].id);
                    return next;
                });
            };

            const uncheckAll = () => {
                setCategories(prev => prev.map(cat => ({
                    ...cat, items: cat.items.map(i => ({...i, completed: false}))
                })));
                setShowResetModal(false);
            };

            const restoreDefaults = () => {
                setCategories(INITIAL_DATA);
                setActiveCat(INITIAL_DATA[0].id);
                setShowResetModal(false);
            };

            const startEdit = (catId, item) => {
                setEditing({ catId, itemId: item.id });
                setEditText(item.text);
            };

            const commitEdit = () => {
                if (!editing) return;
                const text = editText.trim();
                if (text) {
                    setCategories(prev => prev.map(cat => cat.id === editing.catId ? {
                        ...cat, items: cat.items.map(i => i.id === editing.itemId ? {...i, text} : i)
                    } : cat));
                }
                setEditing(null);
                setEditText('');
            };

            const cancelEdit = () => { setEditing(null); setEditText(''); };

            const copy = async () => {
                const text = categories.map(c => `${c.title}:\n` + c.items.map(i => `${i.completed ? '✓' : '○'} ${i.text}`).join('\n')).join('\n\n');
                try {
                    if (navigator.share) {
                        await navigator.share({ title: 'Hurricane 2026 Packliste', text });
                        return;
                    }
                    if (navigator.clipboard) {
                        await navigator.clipboard.writeText(text);
                    } else {
                        const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select();
                        document.execCommand('copy'); document.body.removeChild(el);
                    }
                    alert('Liste in die Zwischenablage kopiert!');
                } catch(e) { /* share cancelled */ }
            };

            const current = categories.find(c => c.id === activeCat);

            const ItemRow = ({ cat, item, iconSize = 'w-6 h-6' }) => {
                const isEditing = editing?.itemId === item.id && editing?.catId === cat.id;
                return (
                    <div className="flex items-center gap-3 py-3 border-b border-slate-100 last:border-0 group">
                        <button onClick={() => toggle(cat.id, item.id)} aria-label="Erledigt umschalten" className={`transition-transform active:scale-75 shrink-0 ${item.completed ? 'text-green-500' : 'text-slate-200'}`}>
                            <Icon name={item.completed ? 'check' : 'circle'} className={iconSize} />
                        </button>
                        {isEditing ? (
                            <input autoFocus value={editText}
                                onChange={e => setEditText(e.target.value)}
                                onKeyDown={e => { if (e.key === 'Enter') commitEdit(); if (e.key === 'Escape') cancelEdit(); }}
                                onBlur={commitEdit}
                                className="flex-1 font-medium bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 outline-none focus:ring-2 focus:ring-blue-500/20" />
                        ) : (
                            <span onClick={() => toggle(cat.id, item.id)} className={`flex-1 text-base font-medium cursor-pointer select-none ${item.completed ? 'text-slate-300 line-through' : 'text-slate-700'}`}>
                                {item.text}
                            </span>
                        )}
                        {!isEditing && (
                            <>
                                <button onClick={() => startEdit(cat.id, item)} aria-label="Bearbeiten" className="text-slate-300 hover:text-blue-500 active:scale-90 transition-all p-1 lg:opacity-0 lg:group-hover:opacity-100"><Icon name="pencil" className="w-4 h-4"/></button>
                                <button onClick={() => del(cat.id, item.id)} aria-label="Löschen" className="text-slate-300 hover:text-red-500 active:scale-90 transition-all p-1 lg:opacity-0 lg:group-hover:opacity-100"><Icon name="trash" className="w-4 h-4"/></button>
                            </>
                        )}
                    </div>
                );
            };

            const CategoryCard = ({ cat }) => {
                const [localInput, setLocalInput] = useState('');
                const catDone = cat.items.filter(i => i.completed).length;
                const isComplete = cat.items.length > 0 && catDone === cat.items.length;
                const addHere = () => {
                    const text = localInput.trim();
                    if (!text) return;
                    setCategories(prev => prev.map(c => c.id === cat.id ? {
                        ...c, items: [...c.items, { id: Date.now().toString(), text, completed: false }]
                    } : c));
                    setLocalInput('');
                };
                return (
                    <section className={`rounded-3xl border p-5 shadow-sm flex flex-col transition-colors ${isComplete ? 'bg-green-50 border-green-200' : 'bg-white border-slate-100'}`}>
                        <div className="flex items-center justify-between mb-3">
                            <h2 className={`text-lg font-extrabold flex items-center gap-2 ${isComplete ? 'text-green-700' : 'text-slate-800'}`}>
                                <Icon name={isComplete ? 'checkCircle' : cat.icon} className="w-5 h-5"/> {cat.title}
                                <span className={`text-xs font-bold tabular-nums ${isComplete ? 'text-green-500' : 'text-slate-400'}`}>{catDone}/{cat.items.length}</span>
                            </h2>
                            {!INITIAL_DATA.some(c => c.id === cat.id) && (
                                <button onClick={() => delCat(cat.id)} className="text-xs text-slate-400 hover:text-red-500 font-bold">Löschen</button>
                            )}
                        </div>
                        {cat.items.length === 0 && (
                            <p className="text-center text-slate-400 text-sm py-6">Noch nichts hier.</p>
                        )}
                        <div className="flex-1">
                            {sortForDisplay(cat.items).map(item => (
                                <ItemRow key={item.id} cat={cat} item={item} />
                            ))}
                        </div>
                        <div className="mt-4 flex gap-2">
                            <input value={localInput} onChange={e => setLocalInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && addHere()}
                                placeholder="Was fehlt noch?" className="flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500/20" />
                            <button onClick={addHere} aria-label="Hinzufügen" className="bg-slate-900 text-white px-4 rounded-2xl font-bold active:scale-90 transition-transform"><Icon name="plus" className="w-4 h-4"/></button>
                        </div>
                    </section>
                );
            };

            const currentComplete = current && current.items.length > 0 && current.items.every(i => i.completed);

            return (
                <div className="max-w-md lg:max-w-7xl mx-auto min-h-screen flex flex-col">
                    <header className="bg-white px-6 lg:px-10 pt-8 pb-4 sticky top-0 z-30 shadow-sm border-b border-slate-100">
                        <div className="flex justify-between items-center mb-4 gap-4">
                            <div>
                                <h1 className="text-2xl lg:text-3xl font-extrabold tracking-tight">Hurricane '26</h1>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">Pack-Manager</p>
                            </div>
                            <div className="flex gap-2 items-center">
                                <button onClick={() => setShowCatModal(true)} className="hidden lg:flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-2xl font-extrabold shadow-lg shadow-blue-100 active:scale-95 transition-transform">
                                    <Icon name="plus" className="w-4 h-4" /> Kategorie
                                </button>
                                <button onClick={() => setShowSyncModal(true)} aria-label="Sync"
                                    className={`p-2.5 bg-slate-50 rounded-full active:scale-90 transition-transform relative ${syncStatus === 'syncing' ? 'animate-pulse' : ''}`}>
                                    <Icon name={syncId ? 'cloud' : 'cloudOff'} className={`w-5 h-5 ${
                                        !syncId ? 'text-slate-600'
                                            : syncStatus === 'error' ? 'text-red-500'
                                            : syncStatus === 'syncing' ? 'text-blue-500'
                                            : 'text-green-500'
                                    }`}/>
                                </button>
                                <button onClick={copy} aria-label="Teilen" className="p-2.5 bg-slate-50 rounded-full active:scale-90 transition-transform"><Icon name="share" className="w-5 h-5 text-slate-600"/></button>
                                <button onClick={() => setShowResetModal(true)} aria-label="Zurücksetzen" className="p-2.5 bg-slate-50 rounded-full active:scale-90 transition-transform"><Icon name="refresh" className="w-5 h-5 text-slate-600"/></button>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex-1 bg-slate-100 h-2.5 rounded-full overflow-hidden">
                                <div className={`h-full transition-all duration-500 ${stats.p === 100 ? 'bg-green-500' : 'bg-blue-600'}`} style={{width: `${stats.p}%`}}></div>
                            </div>
                            <span className={`font-bold text-sm tabular-nums ${stats.p === 100 ? 'text-green-600' : 'text-blue-600'}`}>{stats.done}/{stats.total}</span>
                        </div>
                    </header>

                    {/* Mobile tab nav */}
                    <nav className="lg:hidden flex overflow-x-auto no-scrollbar gap-2 px-6 py-4 bg-white border-b border-slate-50 sticky top-[133px] z-20">
                        {categories.map(c => {
                            const catDone = c.items.filter(i => i.completed).length;
                            const catTotal = c.items.length;
                            const done = catTotal > 0 && catDone === catTotal;
                            const isActive = activeCat === c.id;
                            return (
                                <button key={c.id} onClick={() => setActiveCat(c.id)}
                                    className={`px-4 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all flex items-center gap-2 ${
                                        isActive
                                            ? (done ? 'bg-green-600 text-white shadow-lg' : 'bg-slate-900 text-white shadow-lg')
                                            : (done ? 'bg-green-50 border border-green-200 text-green-700' : 'bg-white border border-slate-200 text-slate-500')
                                    }`}>
                                    <Icon name={done ? 'checkCircle' : c.icon} className="w-4 h-4" /> {c.title}
                                    <span className={`text-[10px] ${isActive ? 'text-white/70' : (done ? 'text-green-500' : 'text-slate-400')}`}>{catDone}/{catTotal}</span>
                                </button>
                            );
                        })}
                    </nav>

                    {/* Mobile: single active category */}
                    <main className="lg:hidden flex-1 px-6 pt-4 pb-32">
                        {current && (
                            <div className="flex items-center justify-between mb-2">
                                <h2 className={`text-lg font-extrabold flex items-center gap-2 ${currentComplete ? 'text-green-700' : 'text-slate-800'}`}>
                                    <Icon name={currentComplete ? 'checkCircle' : current.icon} className="w-5 h-5"/> {current.title}
                                </h2>
                                {!INITIAL_DATA.some(c => c.id === current.id) && (
                                    <button onClick={() => delCat(current.id)} className="text-xs text-slate-400 font-bold">Kategorie löschen</button>
                                )}
                            </div>
                        )}
                        {current?.items.length === 0 && (
                            <p className="text-center text-slate-400 text-sm py-8">Noch nichts in dieser Kategorie.</p>
                        )}
                        {current && sortForDisplay(current.items).map(item => (
                            <ItemRow key={item.id} cat={current} item={item} iconSize="w-7 h-7" />
                        ))}
                        <div className="mt-4 flex gap-2">
                            <input value={newItem} onChange={e => setNewItem(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()}
                                placeholder="Was fehlt noch?" className="flex-1 bg-white border border-slate-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500/20" />
                            <button onClick={add} aria-label="Hinzufügen" className="bg-slate-900 text-white px-5 rounded-2xl font-bold active:scale-90 transition-transform"><Icon name="plus"/></button>
                        </div>
                    </main>

                    {/* Desktop: grid of all categories */}
                    <main className="hidden lg:grid flex-1 px-10 py-8 gap-6 grid-cols-2 xl:grid-cols-3 auto-rows-min">
                        {categories.map(cat => (
                            <CategoryCard key={cat.id} cat={cat} />
                        ))}
                    </main>

                    {/* Mobile floating add-category button */}
                    <div className="lg:hidden fixed bottom-6 left-0 right-0 px-6 z-40 pointer-events-none">
                        <button onClick={() => setShowCatModal(true)}
                            className="w-full max-w-md mx-auto bg-blue-600 text-white py-4 rounded-3xl font-extrabold shadow-2xl shadow-blue-200 flex items-center justify-center gap-2 pointer-events-auto active:scale-95 transition-transform">
                            <Icon name="plus" className="w-6 h-6" /> NEUE KATEGORIE
                        </button>
                    </div>

                    {/* Undo toast */}
                    {undoState && (
                        <div className="fixed left-1/2 -translate-x-1/2 bottom-24 lg:bottom-6 z-50 bg-slate-900 text-white rounded-2xl shadow-2xl px-5 py-3 flex items-center gap-4 animate-slide-up">
                            <span className="text-sm font-medium truncate max-w-[180px] lg:max-w-none">„{undoState.item.text}" gelöscht</span>
                            <button onClick={undoDelete} className="flex items-center gap-1.5 bg-white/10 hover:bg-white/20 text-white font-bold text-sm rounded-xl px-3 py-1.5 transition-colors">
                                <Icon name="undo" className="w-4 h-4" /> Rückgängig
                            </button>
                        </div>
                    )}

                    {/* New category modal */}
                    {showCatModal && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4" onClick={() => setShowCatModal(false)}>
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 animate-slide-up" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-extrabold mb-2 text-center">Neue Kategorie</h3>
                                <input autoFocus value={newCatTitle} onChange={e => setNewCatTitle(e.target.value)}
                                    onKeyDown={e => {
                                        if (e.key === 'Enter' && newCatTitle.trim()) {
                                            const nid = Date.now().toString();
                                            setCategories([...categories, {id: nid, title: newCatTitle.trim(), icon: 'sparkles', items: []}]);
                                            setActiveCat(nid); setNewCatTitle(''); setShowCatModal(false);
                                        }
                                    }}
                                    placeholder="z.B. Technik, Kostüme..." className="w-full bg-slate-50 rounded-2xl px-4 py-4 mb-6 border-0 outline-none focus:ring-2 focus:ring-blue-500" />
                                <div className="flex gap-3">
                                    <button onClick={() => { setShowCatModal(false); setNewCatTitle(''); }} className="flex-1 py-4 text-slate-400 font-bold">Abbrechen</button>
                                    <button onClick={() => {
                                        if(!newCatTitle.trim()) return;
                                        const nid = Date.now().toString();
                                        setCategories([...categories, {id: nid, title: newCatTitle.trim(), icon: 'sparkles', items: []}]);
                                        setActiveCat(nid); setNewCatTitle(''); setShowCatModal(false);
                                    }} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-extrabold shadow-lg shadow-blue-100">Erstellen</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Sync modal */}
                    {showSyncModal && (
                        <SyncModal
                            syncId={syncId}
                            syncStatus={syncStatus}
                            lastSyncedAt={lastSyncedAt}
                            onConnect={connectSync}
                            onDisconnect={disconnectSync}
                            onClose={() => setShowSyncModal(false)}
                            onPullNow={pullRemote}
                        />
                    )}

                    {/* Reset modal */}
                    {showResetModal && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4" onClick={() => setShowResetModal(false)}>
                            <div className="bg-white w-full max-w-sm rounded-[40px] p-8 animate-slide-up" onClick={e => e.stopPropagation()}>
                                <h3 className="text-xl font-extrabold mb-2 text-center">Zurücksetzen</h3>
                                <p className="text-center text-slate-500 text-sm mb-6">Was genau möchtest du zurücksetzen?</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={uncheckAll} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-extrabold shadow-lg shadow-blue-100">
                                        Nur Häkchen entfernen
                                    </button>
                                    <p className="text-xs text-center text-slate-400 -mt-1">Alle Items & Kategorien bleiben erhalten.</p>
                                    <button onClick={() => { if (confirm('Wirklich alles löschen? Eigene Items & Kategorien gehen verloren.')) restoreDefaults(); }} className="w-full py-4 bg-red-50 text-red-600 rounded-2xl font-extrabold border border-red-100">
                                        Auf Standard zurücksetzen
                                    </button>
                                    <p className="text-xs text-center text-slate-400 -mt-1">Setzt die Liste auf die Werksvorgabe zurück.</p>
                                    <button onClick={() => setShowResetModal(false)} className="w-full py-3 text-slate-400 font-bold mt-2">Abbrechen</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
